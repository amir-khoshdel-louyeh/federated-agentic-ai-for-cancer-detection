# # ========================
# # DATA SOURCES
# # ========================
ham_csv: ''
isic_csv: ''
out_dir: outputs

# # ========================
# # SYSTEM SETUP
# # ========================
hospital_ids: HOSPITAL1
num_agents_per_hospital: 4
seed: 42

# # ========================
# # FEDERATED LEARNING
# # ========================
federation:
  aggregation_algorithm: fedavg
  fedprox:
    mu: 0.1
  adaptive:
    alpha: 0.5
    beta: 0.3
    gamma: 0.2
    auc_weight: 0.75
    f1_weight: 0.25
    hospital_weighting: dynamic

# # ========================
# # AGENT CONFIGURATION
# # ========================
agents:
  types:
    - akiec_agent
    - bcc_agent
    - melanoma_agent
    - scc_agent
  patterns:
    available:
      - rule_based
      - bayesian
      - deep_learning
      - hybrid
    default_mapping:
      BCC: hybrid
      SCC: hybrid
      MELANOMA: deep_learning
      AKIEC: bayesian
    allow_dynamic_switch: true

# # ========================
# # META-AGENT CONTROL
# # ========================
meta_agent:
  local:
    enable: true
    weighting_strategy: adaptive
    score_function:
      use_auc: true
      use_f1: true
      use_confidence: true
  global:
    enable: true
    anomaly_detection: true
    trust_reweighting: true

# # ========================
# # PRIVACY & SECURITY
# # ========================
privacy:
  differential_privacy:
    enabled: true
    epsilon: 1.0
  secure_aggregation: true

# # ========================
# # TRACKING & LOGGING
# # ========================
tracking:
  track_per_agent: true
  track_per_hospital: true
  track_confidence: true
  track_stability: true
  save_logs: true
  log_dir: outputs/logs

# # ========================
# # EXPERIMENT CONTROL
# # ========================
simulation:
  simulate_multi: true
  compare_all: true
  num_rounds: 20

# # ========================
# # OUTPUT CONTROL
# # ========================
output:
  save_global_model: true
  save_local_models: false
  save_metrics: true

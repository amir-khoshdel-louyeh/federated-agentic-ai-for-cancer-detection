# # ========================
# # DATA SOURCES
# # ========================
enabled_datasets:
  - HAM10000
ham_csv: 'src/client_side/datasets/HAM10000/HAM10000_metadata.csv'
isic_csv: 'src/client_side/datasets/ISIC2019/ISIC2019_metadata.csv'
out_dir: outputs

# # ========================
# # DATA SPLIT & SAMPLING
# # ========================
data_split:
  train: 0.8
  validation: 0.1
  test: 0.1

sampling:
  total_samples: 1000  # Set to desired number, or null for all available
  random_seed: 42
  # How to assign samples to hospitals: 'even' (divide equally), 'random' (random assignment)
  hospital_sample_assignment: even

# # ========================
# # SYSTEM SETUP
# # ========================
hospital_ids: HOSPITAL1
num_agents_per_hospital: 4

# # ========================
# # FEDERATED LEARNING
# # ========================
federation:
  aggregation_algorithm: no_operation
  fedprox:
    mu: 0.1
  adaptive:
    alpha: 0.5
    beta: 0.3
    gamma: 0.2
    auc_weight: 0.75
    f1_weight: 0.25
    hospital_weighting: dynamic

# # ========================
# # AGENT CONFIGURATION
# # ========================
agents:
  types:
    - akiec_agent
    - bcc_agent
    - melanoma_agent
    - scc_agent
  patterns:
    available:
      - rule_based
      - bayesian
      - deep_learning
    default_mapping:
      BCC: rule_based
      SCC: rule_based
      MELANOMA: deep_learning
      AKIEC: bayesian
    allow_dynamic_switch: true

# # ========================
# # META-AGENT CONTROL
# # ========================
meta_agent:
  local:
    enable: true
    weighting_strategy: adaptive
    score_function:
      use_auc: true
      use_f1: true
      use_confidence: true
  global:
    enable: true
    anomaly_detection: true
    trust_reweighting: true

# # ========================
# # PRIVACY & SECURITY
# # ========================
privacy:
  differential_privacy:
    enabled: true
    epsilon: 1.0
  secure_aggregation: true

# # ========================

# # TRACKING & LOGGING
# # ========================
tracking:
  track_per_agent: true
  track_per_hospital: true
  track_confidence: true
  track_stability: true
  save_logs: true
  log_dir: outputs/logs
  log_file_name: simulation.log

# # ========================
# # EXPERIMENT CONTROL
# # ========================
simulation:
  simulate_multi: true
  compare_all: true
  num_rounds: 20

# # ========================
# # OUTPUT CONTROL
# # ========================
output:
  save_global_model: true
  save_local_models: false
  save_metrics: true

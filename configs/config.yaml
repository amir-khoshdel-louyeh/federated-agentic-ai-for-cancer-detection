# # ========================
# # DATA SOURCES
# # ========================
enabled_datasets:
  - HAM10000
ham_csv: 'src/client_side/datasets/HAM10000/HAM10000_metadata.csv'
isic_csv: 'src/client_side/datasets/ISIC2019/ISIC2019_metadata.csv'
out_dir: outputs

# # ========================
# # DATA SPLIT & SAMPLING
# # ========================
data_split:
  holdout_test: 0.1  # final held-out test set
  k_folds: 5
  current_fold: 0  # 0..k_folds-1 for cross-validation rounds (0 means first fold)
  stratify: true  # use stratified split on malignancy label (target) to preserve class ratio
  mode: tabular  # options: tabular, image, combined
  final_test:
    enabled: true
    n_samples: 100
    random_seed: 42

augmentation:
  enabled: true
  rotation_prob: 0.15
  flip_prob: 0.15
  color_jitter_strength: 0.1
  hair_removal_strength: 0.05
  num_augmented_copies: 0  # 0 means no additional synthetic copies beyond original

sampling:
  total_samples: 5000  # Use all images: 5000 per hospital
  random_seed: 42
  # Samples are always divided equally among hospitals. Total samples must be divisible by the number of hospitals.

# # ========================
# # SYSTEM SETUP
# # ========================
hospital_ids: HOSPITAL1, HOSPITAL2
num_agents_per_hospital: 4

# # ========================
# # FEDERATED LEARNING
# # ========================
federation:
  aggregation_algorithm: fedprox
  fedprox:
    mu: 0.1
  adaptive:
    alpha: 0.5
    beta: 0.3
    gamma: 0.2
    auc_weight: 0.75
    f1_weight: 0.25
    hospital_weighting: dynamic

# # ========================
# # AGENT CONFIGURATION
# # ========================
agents:
  types:
    - akiec_agent
    - bcc_agent
    - melanoma_agent
    - scc_agent
  patterns:
    available:
      - rule_based
      - bayesian
      - deep_learning
      - logistic
      - pretrained_library
    default_mapping:
      BCC: pretrained_library
      SCC: pretrained_library
      MELANOMA: pretrained_library
      AKIEC: pretrained_library
    pattern_params:
      pretrained_library:
        max_iter: 200
        learning_rate: 0.1
        max_depth: 6
        class_weight: balanced
        random_state: 42
    allow_dynamic_switch: false  # if true, agents can switch patterns based on performance

# # FINALIZER AGENT CONFIGURATION
finalizer:
  threshold: 0.5  # Confidence threshold for clean/no-cancer decision

# # ========================
# # META-AGENT CONTROL
# # ========================
meta_agent:
  local:
    enable: true
    weighting_strategy: adaptive
    score_function:
      use_auc: true
      use_f1: true
      use_confidence: true
  global:
    enable: true
    anomaly_detection: true
    trust_reweighting: true

# # ========================
# # PRIVACY & SECURITY
# # ========================
privacy:
  differential_privacy:
    enabled: false
    epsilon: 10.0
  secure_aggregation: false

# # ========================
# # TRACKING & LOGGING
# # ========================
tracking:
  track_per_agent: true
  track_per_hospital: true
  track_confidence: true
  track_stability: true
  save_logs: true
  log_dir: outputs/logs
  log_file_name: simulation.log

# # ========================
# # EXPERIMENT CONTROL
# # ========================
training:
  max_local_samples: 1000  # cap per-cancer local training samples to keep speed stable with big datasets
  rebalance_method: smote  # options: smote, oversample
  imbalance_ratio_threshold: 5
  decision_threshold: 0.3  # evaluate predictions with threshold for binary classification
  decision_thresholds:
    BCC: 0.2
    SCC: 0.3
    MELANOMA: 0.3
    AKIEC: 0.3

simulation:
  simulate_multi: true
  compare_all: true
  num_rounds: 8
  num_epoch: 3
  early_stop_metric: log_loss
  early_stop_patience: 3
  # Additional low-test values for quick library-agent proof-of-concept
  batch_size: 16
  early_stop_metric: auc
  early_stop_patience: 3

# # ========================
# # OUTPUT CONTROL
# # ========================
output:
  save_global_model: true
  save_local_models: false
  save_metrics: true

# ========================
# PROJECT CORE SETTINGS
# ========================
# Focus on detecting the cancer types available in HAM10000
cancer_types:
  - CANCER
  - BCC
  - SCC
  - MELANOMA
  - AKIEC

enabled_datasets:
  - HAM10000

ham_csv: 'src/client_side/datasets/HAM10000/HAM10000_metadata.csv'
out_dir: outputs

# ========================
# DATA STRATEGY (Non-IID for Federated Testing)
# ========================
data_split:
  holdout_test: 0.2    # increase test share for more robust Agent evaluation
  k_folds: 1           # usually one fold is enough in LLM-based systems
  current_fold: 0
  stratify: true
  mode: tabular        # your system is tabular metadata-based

  # map HAM10000 labels to malignant classes
  malignant_ham:
    - mel
    - bcc
    - akiec
    - scc

detection:
  mode: detect_only  # available modes: detect_only, detect_then_type
                       # - detect_only: only run the general cancer detector
                       # - detect_then_type: run the cancer detector and also evaluate specific cancer-type agents

# limit sample count to control LLM cost and runtime
sampling:
  total_samples: 6   # keep initial test volume small
  random_seed: 42

# ========================
# FEDERATION & NODES
# ========================
# simulate three hospitals to test aggregation strength
hospital_ids: 
  - HOSPITAL_A

federation:
  aggregation_algorithm: no_operation  # use adaptive algorithm based on metrics
  num_rounds: 3                   # number of metric exchange rounds between hospitals and server

# ========================
# AGENT & REASONING CONFIG
# ========================
agents:
  types:
    - cancer_detection_agent
    - akiec_agent
    - bcc_agent
    - melanoma_agent
    - scc_agent

  patterns:
    default_mapping:
      CANCER: ai_agent
      BCC: ai_agent
      SCC: ai_agent
      MELANOMA: ai_agent
      AKIEC: ai_agent

# settings related to Agent reasoning
inference:
  uncertainty_threshold: 0.6  # call tools when confidence is below 60%
  decision_threshold: 0.5     # malignancy decision threshold (not used in the code)

prompt_evolution:
  enabled: true
  top_k_hospitals: 1
  bottom_k_hospitals: 1
  min_hospitals: 2
  initial_system_prompt: "Review the clinical lesion metadata and provide a malignancy probability, uncertainty, and a brief clinical reasoning statement."

# ========================
# LLM ENGINE (Local Llama)
# ========================
meta_agent:
  provider: local
  local_llm:
    base_url: "http://localhost:11434/v1"
    model_name: "llama3.1:8b"
    temperature: 0.0          # keep medical reasoning deterministic by using zero temperature

  # server scoring strategy for hospitals
  local:
    enable: true
    weighting_strategy: adaptive
    score_function:
      use_auc: true
      use_f1: true
      use_confidence: true

# ========================
# TRACKING & LOGGING
# ========================
tracking:
  clear_output_on_start: true
  track_per_agent: True
  track_per_hospital: false
  track_confidence: false      # store the Agent confidence level for each prediction
  save_logs: false
  log_dir: outputs/logs

# ========================
# SIMULATION CONTROL
# ========================
simulation:
  simulate_multi: false        # enable multi-hospital mode
  num_rounds: 1
  batch_size: 1               # in agentic systems, evaluate one sample at a time

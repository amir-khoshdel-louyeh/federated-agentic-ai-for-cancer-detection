# Federation of local hospitals agents for skin cancer detection.
# Config fields map directly to components in src/* modules.

# ========================
# DATA SOURCES
# ========================

# Optional explicit set of cancer types supported by this run.
# If omitted, code defaults to [BCC, SCC, MELANOMA, AKIEC].
# Add CANCER when you want a top-level cancer detection step.
cancer_types:
  - CANCER
  - BCC
  - SCC
  - MELANOMA
  - AKIEC

# Datasets loaded and used to create the local hospital sets.
enabled_datasets:
  - HAM10000

ham_csv: 'src/client_side/datasets/HAM10000/HAM10000_metadata.csv'
isic_csv: 'src/client_side/datasets/ISIC2019/ISIC_2019_Training_GroundTruth.csv'
isic_metadata_csv: 'src/client_side/datasets/ISIC2019/ISIC_2019_Training_Metadata.csv'
out_dir: outputs

# ========================
# DATA SPLIT, MALIGNANCY MAPPINGS, AUGMENTATION, SAMPLING
# ========================

data_split:
  # Holdout test fraction for k-fold runs (k_folds > 1) or data split mode
  holdout_test: 0.1
  k_folds: 1
  current_fold: 0

  # malignant labels per dataset to compute binary target.
  malignant_ham:
    - mel
    - bcc
    - akiec
    - scc
  malignant_isic:
    - MEL
    - BCC
    - AK
    - SCC

  # stratified split helps preserve malignancy ratios.
  stratify: true
  mode: tabular

  final_test:
    enabled: false
    n_samples: 0
    random_seed: 42

augmentation:
  enabled: false
  rotation_prob: 0.0
  flip_prob: 0.0
  color_jitter_strength: 0.0
  hair_removal_strength: 0.0
  num_augmented_copies: 0

preprocessing:
  enabled: true
  mode: tabular  # options: tabular, image
  target_encoding: binary  # options: binary, dx
  image:
    resize: [224, 224]
    normalize: imagenet  # options: minmax, imagenet

sampling:
  total_samples: 40
  random_seed: 42

# ========================
# SYSTEM SETTINGS
# ========================

hospital_ids: HOSPITAL1
num_agents_per_hospital: 4

# ========================
# FEDERATED LEARNING SETTINGS
# ========================

federation:
  aggregation_algorithm: no_operation

  fedprox:
    mu: 0.5

  adaptive:
    alpha: 0.5
    beta: 0.3
    gamma: 0.2
    auc_weight: 0.75
    f1_weight: 0.25
    lifecycle_penalty: 0.35
    warning_penalty_per_item: 0.05
    min_reliability_score: 0.0
    hospital_weighting: dynamic

# ========================
# AGENT CONFIGURATION
# ========================

detection:
  enabled: true
  mode: detect_then_type  # options: detect_only, detect_then_type
  decision_threshold: 0.5

agents:
  types:
    - akiec_agent
    - bcc_agent
    - melanoma_agent
    - scc_agent

  patterns:
    available:
      - ai_agent

    default_mapping:
      CANCER: ai_agent
      BCC: ai_agent
      SCC: ai_agent
      MELANOMA: ai_agent
      AKIEC: ai_agent

    allow_dynamic_switch: false

# ========================
# FINALIZER
# ========================

finalizer:
  threshold: 0.15

# ========================
# META-AGENT CONTROL
# ========================

meta_agent:
  provider: local
  local_llm:
    base_url: "http://localhost:11434/v1"
    model_name: "llama3.1:8b"
    temperature: 0
  local:
    enable: true
    weighting_strategy: adaptive
    score_function:
      use_auc: true
      use_f1: true
      use_confidence: true

  global:
    enable: true
    anomaly_detection: true
    trust_reweighting: true

# ========================
# PRIVACY & SECURITY
# ========================

privacy:
  differential_privacy:
    enabled: false
    epsilon: 10.0
  secure_aggregation: false

# ========================
# TRACKING & LOGGING
# ========================

tracking:
  track_per_agent: true
  track_per_hospital: true
  track_confidence: true
  track_stability: true
  save_logs: true
  log_dir: outputs/logs
  log_file_name: simulation.log

# ========================
# TRAINING
# ========================

training:
  max_local_samples: 500
  rebalance_method: oversample
  class_weight: balanced  # options: balanced, none
  imbalance_ratio_threshold: 1
  decision_threshold: 0.10
  decision_thresholds:
    BCC: 0.08
    SCC: 0.05
    MELANOMA: 0.08
    AKIEC: 0.05
  threshold_tuning:
    enabled: false
    rare_classes:
      - SCC
      - AKIEC
    rare_class_recall_weight: 0.70
    min_threshold: 0.01
    max_threshold: 0.35


simulation:
  simulate_multi: false
  compare_all: false
  num_rounds: 1
  num_epoch: 1
  early_stop_metric: auc
  early_stop_patience: 1
  batch_size: 16

# ========================
# OUTPUT SETTINGS
# ========================

output:
  save_global_model: true
  save_local_models: false
  save_metrics: true
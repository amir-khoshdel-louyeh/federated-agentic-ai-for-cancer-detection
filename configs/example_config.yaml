# Example configuration for federated-agentic-ai-for-cancer-detection

ham_csv: data/raw/ham10000/HAM10000_metadata.csv
isic_csv: data/raw/isic2019/ISIC_2019_Training_GroundTruth.csv
out_dir: outputs
hospital_ids: hospital_1,hospital_2,hospital_3
seed: 42

federation:
  aggregation_algorithm: fedavg
  fedprox:
    mu: 0.2
  adaptive:
    alpha: 0.4
    beta: 0.4
    gamma: 0.2
    auc_weight: 0.7
    f1_weight: 0.3

pattern_policy:
  default_mapping:
    BCC: rule_based
    SCC: bayesian
    MELANOMA: deep_learning
    AKIEC: rule_based_strict
  hospital_overrides:
    hospital_1:
      BCC: bayesian
      SCC: rule_based
      MELANOMA: deep_learning
      AKIEC: rule_based_strict
    hospital_2:
      BCC: rule_based_strict
      SCC: bayesian
      MELANOMA: rule_based
      AKIEC: deep_learning

simulate_multi: true
compare_all: false
